workspace_shell:
  workspace_vibrancy_enabled:
    default: true
    scope:
      - main workspace area
      - right sidebar
    behavior:
      - When enabled, only the root workspace shell and root right sidebar keep the strong translucent glass surface.
      - Nested page cards, lists, and controls should use explicit subtle/clear workspace surface classes instead of full panel fills.
      - The toggle lives in Appearance settings and persists in vault settings.
      - Appearance settings own the persisted global accent color; the `Monotone` option resolves to dark accent in light mode and white accent in dark mode.
      - The Appearance settings monotone swatch follows `var(--text)`, so its preview dot flips black in light mode and white in dark mode.
      - Active profile accent tokens are mirrored onto `document.documentElement` so overlays and any portal-rendered UI inherit the current accent even outside the workspace shell wrapper.
      - Shared dialogs and alert dialogs use dedicated glass overlay/content surfaces and inherit the current global accent variables.
      - Shared drawers use glass overlay/content surfaces too, with backdrop blur and side-aware open/close motion instead of opaque panels.
      - The command palette applies current accent tokens to input chrome, result icon chips, selection states, preview tags, and the panel border; in both themes its overlay uses the shared dark dialog scrim, and in light mode the panel uses a translucent gradient glass fill with stronger backdrop blur instead of an opaque white sheet.
      - On the Schedules page, clicking a schedule card in the right panel selects it only; the edit drawer opens from the icon-only workspace header action.
      - The FullCalendar month grid keeps header and day cell backgrounds transparent so the workspace glass shell remains visible behind the calendar lattice.
      - Calendar task completion indicators use `var(--primary-foreground)` for the check glyph so the icon stays light in light mode and dark in dark mode.
      - The finance/subscriptions workspace keeps the page shell transparent and uses subtle glass surface wrappers for KPI cards, treemap, list container, and hover cards instead of opaque panel fills.
      - The subscriptions page caps page-local surface and treemap tile corner radius at `rounded-lg` / 8px; avoid oversized 2xl/3xl/24px rounding there.
      - Table sort/filter UI state persists per renderer in localStorage for project details tables, subscriptions tables/filters, and weekly plan priority sorting; keep the storage keys under the `beacon:` namespace and validate stored payloads before using them.
      - The settings page also caps page-local card, preview, toggle, and accent chip corner radius at `rounded-lg`; avoid xl/2xl/full rounding there.
      - Shared `TabMenu` supports an `inline-accent` variant for section tabs that should read as text with an accent underline instead of boxed pills; use it for settings and project detail milestone/note switching.
      - Excalidraw UI chrome should inherit app accent tokens too: map its toolbar/button/popup/input/theme CSS variables to `--accent`, `--accent-soft`, `--accent-line`, `--text`, `--line`, and `--app-font-family` so board controls match the active profile color.
      - Excalidraw also needs explicit overrides for remaining control clusters that bypass its base theme vars, especially `zoom-actions`, `undo-redo-buttons`, `sidebar-trigger` / library controls, `buttonList` option groups, dropdown selected rows, and right sidebar chrome.
      - When workspace vibrancy is on, the Excalidraw main surface must opt out of the parent `document-workspace-main-surface` backdrop blur and inset highlight; otherwise Excalidraw cursor/tool overlays can drift from pointer position.
      - Excalidraw must also opt out of the shared `page-transition` route animation wrapper and extra padded/rounded inner page shell. Excalidraw caches pointer offset from its mount layout, and route transforms or shell padding can leave eraser/pointer overlays persistently shifted down-right.
      - On this Electron shell, Excalidraw's generated eraser cursor hotspot can render slightly down-right of the true pointer; when the active tool is `eraser`, add a page-shell class and force the board canvases to use a native `crosshair` cursor instead of Excalidraw's generated cursor.
      - The agent chat page and its `ai-elements` surfaces also cap message bubbles, composer, empty states, pills, task cards, and chat-side controls at `rounded-lg`; avoid 2xl/3xl/full rounding there.
      - The dashboard page also caps cards, chips, empty states, and rank badges at `rounded-lg`; avoid 2xl/full rounding there.
      - The Knowledge page does not render the React Flow dotted background layer; keep the canvas visually clean behind its content.
      - Generic workspace surfaces and glass panels keep stable border colors on hover; button-like `workspace-subtle-control` elements and explicit button styles may shift their border to the accent color on hover.
      - Document workspace header borders, header action dividers, and the right panel left border use `var(--sidebar-border)` to match the global sidebar line color and style.
      - Global sidebar and workspace right panel both use shared `var(--sidebar-glass-opacity)` with a translucent `::after` overlay from `var(--sidebar-glass-overlay)`; no forced backdrop layer is rendered. Both side shadows use reduced-width `::before` strips at `z-index: 1` with subtle mirrored gradients, not element box shadows.
      - Document workspace main surface keeps no outer shadow so it does not cast into the right panel; only its inset highlight remains.
      - Focus mode hides both sidebar shadow strips because the global sidebar moves offcanvas while the right panel remains visible.
      - Global sidebar glass styling remains managed separately from workspace shell styling.
      - The global sidebar `XINGULARITY` / `Workspace` brand text uses a subtle looping shimmer sweep; keep it restrained and text-only.
      - The global sidebar navigation uses compact collapsible section headers with uppercase labels and one plain icon per group; child destinations are text-only rows nested directly on a connected vertical indent rail with a solid line color, while footer settings remains a standalone menu row instead of its own section.
      - Right panel section cards and selectable list cards use the shared `sidebar-menu-card right-panel-menu-card` styling so they match global sidebar menu cards, including visible sidebar-border outlines, accent hover/focus borders, active gradient via `data-active`, stronger click-origin accent ripple feedback on clickable cards, and no inherited 100% min-height section offset.
      - Right-panel lists may reveal with item-by-item stagger on panel open; use `useStaggeredScrollReveal` for normal scroll lists and `right-panel-stagger-item` CSS delays for virtualized/static panel rows when that motion is still desired. The Notes tree explorer does not use staggered row reveal animation.
      - Native `button` elements across the renderer use the same click-origin accent ripple animation as the global sidebar menu buttons; opt out only with `data-no-ripple`.
      - Shared data tables opt out of the global button ripple at the table-shell level, so sortable headers and any table-embedded buttons do not show the click-wave animation.
      - Calendar drag/drop highlights should fill the entire visible target area with square edges and an accent-tone fill: month-cell drop highlights stretch across the full day cell, and the unscheduled-task right-panel drop state stretches across the full task list area instead of only the current content height.
      - The calendar task edit dialog hides the default top-right close control and does not render any close action in the footer; delete is the only footer action.
      - Calendar scheduled tasks and right-panel unscheduled tasks share the `calendar-task-card-shell` visual contract for task surfaces and drag previews; keep the floating drag mirror/card consistent across both areas.
      - Calendar task priority no longer changes the card surface tint. Instead, task rows show a colored `!` marker before the title for medium/high priority only, and task context menus expose priority changes. Low priority is the default and shows no marker.
      - Calendar scheduled tasks and right-panel unscheduled tasks share hover-card details and click-to-edit task dialog behavior.
      - The shared calendar task edit dialog exposes title, priority, type, date, and time editing for both scheduled and unscheduled tasks.
      - Calendar task type selectors share the same source of truth from `src/shared/types.ts`; current supported types are `meeting`, `assignment`, `review`, `personal`, `call`, `deep-work`, `errand`, `follow-up`, and `other`, each with matching calendar/day-view color styling.
      - Calendar task hover cards clamp like the subscriptions page hover cards: 288px width, 168px estimated height, 16px viewport margin, and 18px cursor offset.
      - Calendar task moves update renderer state optimistically before vault persistence, so cross-area drops should not wait for disk writes or FullCalendar revert animation.
      - Note editor tables use accent-colored cell borders, rounded outer corners, and translucent accent-soft table headers; note editor code blocks, callouts, and embedded buttons use tighter 4px rounding.
      - Note editor blockquotes render as callouts by default: plain `>` quotes use the neutral note callout style, while Obsidian-style markers like `> [!NOTE]` / `> [!INFO]` / `> [!SUCCESS]` / `> [!WARNING]` / `> [!DANGER]` switch the variant color for border, background tint, and inner text. Variant detection accepts persisted escaped markers like `> \[!info]`, same-line body text after the marker, a trailing hard-break backslash, and maps `succes` to success. Only the first leading marker triggers variant detection, and the remaining quoted text becomes the callout body. Keep marker-only callouts visible so arrow-key navigation has an editable caret target.
      - Note search transitions from an open note must flush and settle the current editor before setting a non-empty search query, because the search results view unmounts the editor.
      - Opening the already-current note should be a no-op/focus action, not a cached-session reload, so same-note clicks cannot overwrite unsaved live editor content.
